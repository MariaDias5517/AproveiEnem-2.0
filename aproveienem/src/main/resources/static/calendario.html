<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Stay organized with our user-friendly Calendar featuring events, reminders, and a customizable interface. Built with HTML, CSS, and JavaScript. Start scheduling today!" />
  <meta name="keywords" content="calendar, events, reminders, javascript, html, css, open source coding" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
    integrity="sha512-xh6O/CkQoPOWDdYTDqeRdPCVd1SpvCA9XXcUnZS2FmJNp1coAFzvtCN9BmamE+4aHK8yyUHUSCcJHgXloTyT2A=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="assets/css/calendario.css" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <title>Calendário de Eventos</title>
</head>

<body>

  <!--inicio barracima-->
  <nav class="navbar">
    <div class="logo_item">
      <i class="bx bx-menu" id="sidebarOpen"></i>
      <img src="assets/images/logo2.png" alt="AproveiEnem Logo" style="width: 50px; height: auto;"></i>AproveiEnem
    </div>

    <div class="search_bar">
      <input type="text" placeholder="Pesquisar" />
    </div>
      <i class="bi bi-grid"></i>
      <i class='bx bx-sun' id="darkLight"></i>
      <i class='bx bx-bell'></i>
      <img src="assets/images/profile.jpg" alt="" class="profile" />
    </div>
  </nav><!--fim barracima-->

  <!-- inicio barralateral -->
  <nav class="sidebar">
    <div class="menu_content">
      <ul class="menu_items">
        <div class="menu_title menu_dahsboard"></div>

        <!-- Start -->
        <li class="item">
          <div href="#" class="nav_link submenu_item">
          </div>
        </li>

        <li class="item">
          <div href="telaprincipal.html" class="nav_link submenu_item">
            <span class="navlink_icon">
              <i class="bx bx-home-alt"></i>
            </span>
            <span class="navlink">Inicio</span>
          </div>
        </li>

        <li class="item">
          <a href="telamaterias.html" class="nav_link">
            <span class="navlink_icon">
              <i class='bx bx-layer'></i>
            </span>
            <span class="navlink">Matérias</span>
          </a>
        </li>

        <li class="item">
          <a href="calendario.html" class="nav_link">
            <span class="navlink_icon">
              <i class='bx bx-calendar-check'></i>
            </span>
            <span class="navlink">Calendário</span>
          </a>
        </li>

        <li class="item">
          <a href="teladequestoes.html" class="nav_link">
            <span class="navlink_icon">
              <i class='bx bx-calendar-check'></i>
            </span>
            <span class="navlink">Questões</span>
          </a>
        </li>
        <!-- End -->
      </ul>

      <!-- Start -->
      <ul class="menu_items">


        <li class="item">
          <a href="configuracao.html" class="nav_link">
            <span class="navlink_icon">
              <i class="bx bx-cog"></i>
            </span>
            <span class="navlink">Configuração</span>
          </a>
        </li>
      </ul>
      <!-- End -->

      <!-- BarraLateral Abrir / Fechar -->
      <div class="bottom_content">
        <div class="bottom expand_sidebar">
          <span> Abrir</span>
          <i class='bx bx-log-in'></i>
        </div>
        <div class="bottom collapse_sidebar">
          <span> Fechar</span>
          <i class='bx bx-log-out'></i>
        </div>
      </div>
    </div>
  </nav>
  <!-- fim barralateral-->






  <div class="container">
    <div class="left">
      <div class="calendar">
        <div class="month">
          <i class="fas fa-angle-left prev"></i>
          <div class="date">dezembro 2015</div>
          <i class="fas fa-angle-right next"></i>
        </div>
        <div class="weekdays">
          <div>Dom</div>
          <div>Seg</div>
          <div>Ter</div>
          <div>Qua</div>
          <div>Qui</div>
          <div>Sex</div>
          <div>Sáb</div>
        </div>
        <div class="days"></div>
        <div class="goto-today">
          <div class="goto">
            <input type="text" placeholder="mm/yyyy" class="date-input" />
            <button class="goto-btn">Buscar</button>
          </div>
          <button class="today-btn">Hoje</button>
        </div>
      </div>
    </div>
    <div class="right">
      <div class="today-date">
        <div class="event-day text-gray">Qua</div>
        <div class="event-date">12 dezembro 2022</div>
      </div>
      <div class="events"></div>
      <div class="add-event-wrapper">
        <div class="add-event-header">
          <div class="title">Adicionar Evento</div>
          <i class="fas fa-times close"></i>
        </div>
        <div class="add-event-body">
          <div class="add-event-input">
            <input type="text" placeholder="Nome do Evento" class="event-name" />
          </div>
          <div class="add-event-input">
            <input type="text" placeholder="Evento Inicia: 00:00" class="event-time-from" />
          </div>
          <div class="add-event-input">
            <input type="text" placeholder="Evento Termina: 00:00" class="event-time-to" />
          </div>
        </div>
        <div class="add-event-footer">
          <button class="add-event-btn">Adicionar Evento</button>
        </div>
      </div>
    </div>
    <button class="add-event">
      <i class="fas fa-plus"></i>
    </button>
  </div>
  <script src="assets/js/calendario.js"></script>
</body>

</html>
